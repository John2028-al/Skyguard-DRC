<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion SkyGuard</title>
<style>
body{
    margin:0;
    background:radial-gradient(circle at top,#0f766e,#020617 45%);
    color:white;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.box{
    width:90%;
    max-width:420px;
    background:#0f172a;
    padding:28px;
    border-radius:24px;
    border:1px solid #38bdf8;
    box-shadow:0 0 35px rgba(56,189,248,.2);
}
h2{
    text-align:center;
    color:#67e8f9;
}
input,button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    border:0;
    font-size:16px;
}
input{
    background:#020617;
    color:white;
    border:1px solid #334155;
}
button{
    background:#0284c7;
    color:white;
    font-weight:bold;
}
.error{
    color:#fecaca;
    background:#7f1d1d;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
.small{
    font-size:12px;
    color:#94a3b8;
    text-align:center;
}
</style>
</head>
<body>

<div class="box">
    <h2>🛡️ SkyGuard DRC</h2>
    <p class="small">Accès sécurisé au centre de commandement</p>

    <form method="POST">
        <input type="password" name="code" placeholder="Code d’accès" required>
        <button type="submit">Se connecter</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
